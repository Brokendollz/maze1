<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Diamond Dash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="gw">
  <h1>Diamond Dash</h1>
  <div id="hud">
    <div class="hud-card"><span class="icon">💎</span> <b id="c">0</b> / <b id="n">0</b></div>
    <div class="hud-card"><span class="icon">🔷</span> Remaining: <b id="r">0</b></div>
    <div class="hud-card"><span class="icon">🔥</span> Fire every <b>3</b>s</div>
  </div>
  <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
  <div id="msg"></div>
  <div id="ctrl">Arrows / WASD / Drag — Red diamond is about to burn!</div>
  <div id="dpad">
    <button id="btn-up">▲</button>
    <button id="btn-left">◀</button>
    <button id="btn-down">▼</button>
    <button id="btn-right">▶</button>
  </div>
  <button id="rb" style="display:none" onclick="initGame()">New Game</button>
</div>
<script src="game.js"></script>
</body>
</html>
