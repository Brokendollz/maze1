<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Diamond Dash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=5">
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.2/nipplejs.min.js"></script>
</head>
<body>
<div id="gw">
  <div id="game-area">
    <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
  </div>
  <div id="sidebar">
    <h1>Diamond Dash</h1>
    <div id="hud">
      <div class="hud-card"><span class="icon">⭐</span> Level <b id="lv">1</b></div>
      <div class="hud-card"><span class="icon">💎</span> <b id="c">0</b> / <b id="n">0</b></div>
      <div class="hud-card"><span class="icon">🏆</span> Score: <b id="sc">0</b></div>
      <div class="hud-card"><span class="icon">🔷</span> Left: <b id="r">0</b></div>
      <div class="hud-card"><span class="icon">🔥</span> <b id="fi">4.0</b>s</div>
    </div>
    <div id="msg"></div>
    <div id="ctrl">❄️ Ice=Freeze · ⏳ Time=Slow · 💥 Bomb=Explode<br>Collect combos for bonus!<br>Arrows / WASD / Drag</div>
    <div id="joystick-zone"></div>
    <button id="rb" style="display:none" onclick="initGame()">New Game</button>
  </div>
</div>
<script src="game.js?v=5"></script>
</body>
</html>
