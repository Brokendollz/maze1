<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Diamond Dash</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;font-family:system-ui,sans-serif;padding:1rem 0.5rem}
#gw{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:560px}
#hud{display:flex;gap:12px;font-size:13px;color:#aaa;flex-wrap:wrap;justify-content:center;width:100%}
#hud b{color:#fff;font-weight:500}
#canvas{border:1px solid #333;border-radius:8px;display:block;touch-action:none;cursor:default}
#msg{font-size:14px;font-weight:500;color:#fff;min-height:20px;text-align:center;padding:0 8px}
#ctrl{font-size:11px;color:#666;text-align:center}
#dpad{display:grid;grid-template-areas:". up ." "left down right";gap:clamp(4px,1.2vw,8px);margin-top:8px;padding:12px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px))}
#dpad button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:16px;padding:0;font-size:clamp(22px,6vw,30px);width:clamp(58px,16vw,76px);height:clamp(58px,16vw,76px);background:rgba(26,26,46,0.85);border:1.5px solid rgba(100,100,180,0.3);color:rgba(200,200,255,0.85);box-shadow:0 2px 8px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.06);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:transform 0.08s ease,box-shadow 0.08s ease,background 0.08s ease}
#dpad button.pressed{transform:scale(0.88);background:rgba(60,60,120,0.9);border-color:rgba(130,130,220,0.5);box-shadow:0 0 16px rgba(100,100,255,0.25),inset 0 1px 0 rgba(255,255,255,0.1);color:#fff}
#btn-up{grid-area:up}#btn-left{grid-area:left}#btn-down{grid-area:down}#btn-right{grid-area:right}
#rb{margin-top:8px;padding:8px 20px;background:#1a1a2e;border:1px solid #444;color:#fff;border-radius:8px;cursor:pointer;font-size:14px}
h1{color:#ffd700;font-size:18px;font-weight:500;margin-bottom:4px}
</style>
</head>
<body>
<div id="gw">
  <h1>💎 Diamond Dash</h1>
  <div id="hud">
    <div>💎 <b id="c">0</b> / <b id="n">0</b></div>
    <div>Remaining: <b id="r">0</b></div>
    <div>Fire every <b>3</b> seconds</div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="msg"></div>
  <div id="ctrl">Arrows / WASD / Drag — Red diamond is about to burn!</div>
  <div id="dpad">
    <button id="btn-up">▲</button>
    <button id="btn-left">◀</button>
    <button id="btn-down">▼</button>
    <button id="btn-right">▶</button>
  </div>
  <button id="rb" style="display:none" onclick="initGame()">New Game</button>
</div>
<script>
const COLS=13,ROWS=11,NEED=6,I_FIRE=5,I_GEM=11,FIRE_MS=3000;
const EMPTY=0,WALL=1,GEM=2,FIRE=3,DX=COLS-2,DY=ROWS-2;
let T=40,grid,px,py,collected,doorOpen,dead,won,rafId,fInt,nextBurn,burnStartTime;
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
function calcTile(){return Math.max(26,Math.floor(Math.min(window.innerWidth-24,540)/COLS));}
function resizeCanvas(){T=calcTile();canvas.width=COLS*T;canvas.height=ROWS*T;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}return a;}
function pickNextBurn(){let gems=[];for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(grid[y][x]===GEM)gems.push({x,y});if(!gems.length){nextBurn=null;return;}nextBurn=gems[0|Math.random()*gems.length];burnStartTime=performance.now();}
function initGame(){if(rafId)cancelAnimationFrame(rafId);if(fInt)clearInterval(fInt);resizeCanvas();collected=0;doorOpen=false;dead=false;won=false;px=1;py=1;nextBurn=null;grid=Array.from({length:ROWS},(_,y)=>Array.from({length:COLS},(_,x)=>(x===0||x===COLS-1||y===0||y===ROWS-1)?WALL:(x%2===0&&y%2===0)?WALL:EMPTY));const safe=new Set(['1,1','2,1','1,2',`${DX},${DY}`]);let open=[];for(let y=1;y<ROWS-1;y++)for(let x=1;x<COLS-1;x++)if(grid[y][x]===EMPTY&&!safe.has(`${x},${y}`))open.push({x,y});shuffle(open);for(let i=0;i<I_FIRE&&i<open.length;i++)grid[open[i].y][open[i].x]=FIRE;for(let i=I_FIRE;i<I_FIRE+I_GEM&&i<open.length;i++)grid[open[i].y][open[i].x]=GEM;updHUD();document.getElementById('msg').textContent='';document.getElementById('rb').style.display='none';pickNextBurn();fInt=setInterval(burnOne,FIRE_MS);rafId=requestAnimationFrame(loop);}
function burnOne(){if(dead||won)return;if(nextBurn&&grid[nextBurn.y][nextBurn.x]===GEM)grid[nextBurn.y][nextBurn.x]=FIRE;updHUD();pickNextBurn();}
function updHUD(){let g=0;for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(grid[y][x]===GEM)g++;document.getElementById('c').textContent=collected;document.getElementById('n').textContent=NEED;document.getElementById('r').textContent=g;}
function tryMove(dx,dy){if(dead||won)return;const nx=px+dx,ny=py+dy;if(nx<0||nx>=COLS||ny<0||ny>=ROWS||grid[ny][nx]===WALL)return;px=nx;py=ny;const tile=grid[ny][nx];if(tile===GEM){grid[ny][nx]=EMPTY;if(nextBurn&&nextBurn.x===nx&&nextBurn.y===ny)pickNextBurn();collected++;if(collected>=NEED&&!doorOpen){doorOpen=true;document.getElementById('msg').textContent='The door is open! Find it!';setTimeout(()=>{if(!dead&&!won)document.getElementById('msg').textContent='';},2500);}updHUD();}else if(tile===FIRE){dead=true;clearInterval(fInt);document.getElementById('msg').textContent='You burned! Game over.';document.getElementById('rb').style.display='block';}else if(doorOpen&&nx===DX&&ny===DY){won=true;clearInterval(fInt);document.getElementById('msg').textContent='You won! You escaped!';document.getElementById('rb').style.display='block';}}
function drawFloor(x,y){ctx.fillStyle='#181830';ctx.fillRect(x*T,y*T,T,T);ctx.strokeStyle='rgba(255,255,255,0.035)';ctx.lineWidth=0.5;ctx.strokeRect(x*T+.25,y*T+.25,T-.5,T-.5);}
function drawWall(x,y){const bx=x*T,by=y*T;ctx.fillStyle='#0d2d52';ctx.fillRect(bx,by,T,T);ctx.fillStyle='#1a4a7a';ctx.fillRect(bx,by,T,Math.max(3,T/8));ctx.fillStyle='#081c35';ctx.fillRect(bx,by+T-Math.max(2,T/13),T,Math.max(2,T/13));}
function drawGem(x,y,t){const isDoomed=nextBurn&&nextBurn.x===x&&nextBurn.y===y;const cx=x*T+T/2,cy=y*T+T/2,hs=T*0.22;ctx.save();ctx.translate(cx,cy);ctx.rotate(Math.PI/4);if(isDoomed){const elapsed=t-burnStartTime;const pulse=0.5+0.5*Math.sin(elapsed*(0.007+0.004*(elapsed/FIRE_MS))*2*Math.PI/1000);ctx.fillStyle=`rgb(255,${Math.round(140*(1-pulse))},0)`;ctx.fillRect(-hs,-hs,hs*2,hs*2);ctx.fillStyle=`rgba(255,255,${Math.round(80*(1-pulse))},0.55)`;ctx.fillRect(-hs,-hs,hs*0.55,hs*0.55);}else{ctx.fillStyle='#00d4ff';ctx.fillRect(-hs,-hs,hs*2,hs*2);ctx.fillStyle='rgba(255,255,255,0.55)';ctx.fillRect(-hs,-hs,hs*0.55,hs*0.55);ctx.fillStyle='rgba(0,80,140,0.35)';ctx.fillRect(hs*0.44,hs*0.44,hs*0.56,hs*0.56);}ctx.restore();if(isDoomed){const pct=Math.min(1,(t-burnStartTime)/FIRE_MS);ctx.fillStyle=`rgba(255,80,0,${pct*0.75})`;ctx.beginPath();ctx.arc(cx,cy-T*0.32-pct*T*0.1,(2+pct*2)*T/40*1.5,0,Math.PI*2);ctx.fill();}}
function drawFire(x,y,t){const bx=x*T,by=y*T,h=T,w=T;const s=(seed)=>0.5+0.5*Math.sin(t*.01+seed);const f1=s(x*2.1+y*1.7),f2=s(x*1.5+y*2.3+1.5),f3=s(x*1.9+y*1.2+3.0);ctx.fillStyle='#2a0000';ctx.fillRect(bx+w*.075,by+h*.825,w*.85,h*.175);ctx.beginPath();ctx.moveTo(bx+w*.1,by+h*.95);ctx.quadraticCurveTo(bx+w*.05+f1*w*.075,by+h*.5+f1*h*.1,bx+w*.35,by+h*.3+f1*h*.15);ctx.quadraticCurveTo(bx+w*.5,by+h*.5,bx+w*.42,by+h*.95);ctx.closePath();ctx.fillStyle='#aa1a00';ctx.fill();ctx.beginPath();ctx.moveTo(bx+w*.58,by+h*.95);ctx.quadraticCurveTo(bx+w*.95+f3*w*.05,by+h*.5+f3*h*.1,bx+w*.7,by+h*.3+f3*h*.15);ctx.quadraticCurveTo(bx+w*.5,by+h*.5,bx+w*.9,by+h*.95);ctx.closePath();ctx.fillStyle='#aa1a00';ctx.fill();ctx.beginPath();ctx.moveTo(bx+w*.175,by+h*.95);ctx.quadraticCurveTo(bx+w*.125+f2*w*.05,by+h*.35+f2*h*.1,bx+w*.5,by+h*.12+f2*h*.2);ctx.quadraticCurveTo(bx+w*.875+f2*w*.05,by+h*.35+f2*h*.1,bx+w*.825,by+h*.95);ctx.closePath();ctx.fillStyle='#dd2200';ctx.fill();ctx.beginPath();ctx.moveTo(bx+w*.275,by+h*.95);ctx.quadraticCurveTo(bx+w*.225+f2*w*.05,by+h*.45+f2*h*.1,bx+w*.5,by+h*.3+f2*h*.2);ctx.quadraticCurveTo(bx+w*.775+f2*w*.05,by+h*.45+f2*h*.1,bx+w*.725,by+h*.95);ctx.closePath();ctx.fillStyle='#ff5500';ctx.fill();ctx.beginPath();ctx.moveTo(bx+w*.375,by+h*.95);ctx.quadraticCurveTo(bx+w*.5,by+h*.38+f2*h*.15,bx+w*.625,by+h*.95);ctx.closePath();ctx.fillStyle='#ffcc00';ctx.fill();ctx.beginPath();ctx.moveTo(bx+w*.44,by+h*.55+f2*h*.1);ctx.quadraticCurveTo(bx+w*.5,by+h*.28+f2*h*.15,bx+w*.56,by+h*.55+f2*h*.1);ctx.closePath();ctx.fillStyle='#ffff88';ctx.fill();}
function drawDoor(t){const bx=DX*T,by=DY*T,p=0.7+0.3*Math.sin(t*.004);ctx.fillStyle='#001a0d';ctx.fillRect(bx,by,T,T);ctx.fillStyle=`rgba(0,${0|120+50*p},60,1)`;ctx.fillRect(bx+T*.125,by+T*.125,T*.75,T*.875);ctx.fillStyle=`rgba(0,${0|180+60*p},100,1)`;ctx.fillRect(bx+T*.2,by+T*.2,T*.6,T*.7);ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(bx+T*.7,by+T*.5,T*.075,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,255,100,0.4)';ctx.lineWidth=2;ctx.strokeRect(bx+2,by+2,T-4,T-4);}
function drawPlayer(){const cx=px*T+T/2,cy=py*T+T/2,r=T*0.32;ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#996600';ctx.lineWidth=Math.max(1.5,T/24);ctx.stroke();const er=r*.19;ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(cx-r*.3,cy-r*.23,er,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+r*.3,cy-r*.23,er,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=Math.max(1,T/32);ctx.beginPath();ctx.arc(cx,cy+r*.15,r*.38,.2,Math.PI-.2);ctx.stroke();}
function loop(t){ctx.clearRect(0,0,canvas.width,canvas.height);for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){drawFloor(x,y);const tile=grid[y][x];if(tile===WALL)drawWall(x,y);else if(tile===GEM)drawGem(x,y,t);else if(tile===FIRE)drawFire(x,y,t);if(doorOpen&&x===DX&&y===DY)drawDoor(t);}drawPlayer();if(dead||won){ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.font=`500 ${Math.max(16,T*.55)}px system-ui,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=won?'#00cc66':'#ff6600';ctx.fillText(won?'You won! You escaped!':'You burned! Try again.',canvas.width/2,canvas.height/2);return;}rafId=requestAnimationFrame(loop);}
document.addEventListener('keydown',e=>{const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};if(m[e.key]){tryMove(...m[e.key]);e.preventDefault();}});
function haptic(){try{navigator.vibrate&&navigator.vibrate(12);}catch(e){}}
function bindBtn(id,dx,dy){const btn=document.getElementById(id);let hTimer=null,hDelay=180,hRate=100;function start(e){e.preventDefault();btn.classList.add('pressed');haptic();tryMove(dx,dy);clearInterval(hTimer);hTimer=setTimeout(()=>{hTimer=setInterval(()=>{haptic();tryMove(dx,dy);},hRate);},hDelay);}function stop(){btn.classList.remove('pressed');clearInterval(hTimer);clearTimeout(hTimer);hTimer=null;}btn.addEventListener('pointerdown',start,{passive:false});btn.addEventListener('pointerup',stop);btn.addEventListener('pointerleave',stop);btn.addEventListener('pointercancel',stop);btn.addEventListener('contextmenu',e=>e.preventDefault());}
bindBtn('btn-up',0,-1);bindBtn('btn-down',0,1);bindBtn('btn-left',-1,0);bindBtn('btn-right',1,0);
let ts=null;canvas.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();},{passive:false});canvas.addEventListener('touchend',e=>{if(!ts)return;const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;if(Math.max(Math.abs(dx),Math.abs(dy))>18)Math.abs(dx)>Math.abs(dy)?tryMove(dx>0?1:-1,0):tryMove(0,dy>0?1:-1);ts=null;e.preventDefault();},{passive:false});
let resizeTimer=null;window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if(dead||won)return;T=calcTile();canvas.width=COLS*T;canvas.height=ROWS*T;},100);});
initGame();
</script>
</body>
</html>
