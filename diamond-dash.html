<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Diamond Dash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#08090f;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(30,60,120,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(100,40,120,0.1) 0%, transparent 50%);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  min-height:100vh;font-family:'Inter',system-ui,sans-serif;padding:1.2rem 0.5rem;
  color:#c8cad0;
}
#gw{
  display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:580px;
}
h1{
  font-family:'Orbitron','Inter',system-ui,sans-serif;
  font-size:clamp(18px,4.5vw,24px);font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:2px;
  filter:drop-shadow(0 0 12px rgba(96,165,250,0.3));
}
#hud{
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;width:100%;
}
.hud-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;
  padding:6px 14px;
  font-size:12px;color:#8b8fa3;
  backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:6px;
  transition:border-color 0.3s;
}
.hud-card:hover{border-color:rgba(255,255,255,0.15)}
.hud-card b{color:#e2e4ea;font-weight:600}
.hud-card .icon{font-size:14px}
#canvas-wrap{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 8px 32px rgba(0,0,0,0.5),
    0 0 60px rgba(96,165,250,0.06);
}
#canvas{display:block;touch-action:none;cursor:default;border-radius:14px}
#msg{
  font-size:13px;font-weight:500;color:#a78bfa;min-height:20px;
  text-align:center;padding:0 8px;
  transition:color 0.3s;
}
#ctrl{font-size:11px;color:#4a4d5e;text-align:center;letter-spacing:0.3px}
#dpad{display:grid;grid-template-areas:". up ." "left down right";gap:6px;margin-top:4px}
#dpad button{
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  border-radius:12px;padding:0;
  font-size:clamp(16px,4.5vw,22px);
  width:clamp(50px,14vw,68px);height:clamp(50px,14vw,68px);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  color:#6b6f85;
  backdrop-filter:blur(4px);
  transition:all 0.15s ease;
}
#dpad button:hover{
  background:rgba(255,255,255,0.08);
  border-color:rgba(167,139,250,0.3);
  color:#a78bfa;
}
#dpad button:active{
  background:rgba(167,139,250,0.15);
  transform:scale(0.95);
}
#btn-up{grid-area:up}#btn-left{grid-area:left}#btn-down{grid-area:down}#btn-right{grid-area:right}
#rb{
  margin-top:10px;padding:10px 28px;
  background:linear-gradient(135deg,rgba(167,139,250,0.15),rgba(96,165,250,0.15));
  border:1px solid rgba(167,139,250,0.25);
  color:#c8cad0;border-radius:10px;cursor:pointer;
  font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;
  letter-spacing:0.5px;text-transform:uppercase;
  backdrop-filter:blur(4px);
  transition:all 0.2s ease;
}
#rb:hover{
  background:linear-gradient(135deg,rgba(167,139,250,0.25),rgba(96,165,250,0.25));
  border-color:rgba(167,139,250,0.4);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(167,139,250,0.15);
}
</style>
</head>
<body>
<div id="gw">
  <h1>Diamond Dash</h1>
  <div id="hud">
    <div class="hud-card"><span class="icon">💎</span> <b id="c">0</b> / <b id="n">0</b></div>
    <div class="hud-card"><span class="icon">🔷</span> Remaining: <b id="r">0</b></div>
    <div class="hud-card"><span class="icon">🔥</span> Fire every <b>3</b>s</div>
  </div>
  <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
  <div id="msg"></div>
  <div id="ctrl">Arrows / WASD / Drag — Red diamond is about to burn!</div>
  <div id="dpad">
    <button id="btn-up">▲</button>
    <button id="btn-left">◀</button>
    <button id="btn-down">▼</button>
    <button id="btn-right">▶</button>
  </div>
  <button id="rb" style="display:none" onclick="initGame()">New Game</button>
</div>
<script>
const COLS=13,ROWS=11,NEED=6,I_FIRE=5,I_GEM=11,FIRE_MS=3000;
const EMPTY=0,WALL=1,GEM=2,FIRE=3,DX=COLS-2,DY=ROWS-2;
let T=40,grid,px,py,collected,doorOpen,dead,won,rafId,fInt,nextBurn,burnStartTime;
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function calcTile(){return Math.max(26,Math.floor(Math.min(window.innerWidth-24,540)/COLS));}
function resizeCanvas(){T=calcTile();canvas.width=COLS*T;canvas.height=ROWS*T;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}return a;}
function pickNextBurn(){let gems=[];for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(grid[y][x]===GEM)gems.push({x,y});if(!gems.length){nextBurn=null;return;}nextBurn=gems[0|Math.random()*gems.length];burnStartTime=performance.now();}

function initGame(){
  if(rafId)cancelAnimationFrame(rafId);if(fInt)clearInterval(fInt);
  resizeCanvas();collected=0;doorOpen=false;dead=false;won=false;px=1;py=1;nextBurn=null;
  grid=Array.from({length:ROWS},(_,y)=>Array.from({length:COLS},(_,x)=>
    (x===0||x===COLS-1||y===0||y===ROWS-1)?WALL:(x%2===0&&y%2===0)?WALL:EMPTY));
  const safe=new Set(['1,1','2,1','1,2',`${DX},${DY}`]);
  let open=[];
  for(let y=1;y<ROWS-1;y++)for(let x=1;x<COLS-1;x++)if(grid[y][x]===EMPTY&&!safe.has(`${x},${y}`))open.push({x,y});
  shuffle(open);
  for(let i=0;i<I_FIRE&&i<open.length;i++)grid[open[i].y][open[i].x]=FIRE;
  for(let i=I_FIRE;i<I_FIRE+I_GEM&&i<open.length;i++)grid[open[i].y][open[i].x]=GEM;
  updHUD();
  document.getElementById('msg').textContent='';
  document.getElementById('rb').style.display='none';
  pickNextBurn();fInt=setInterval(burnOne,FIRE_MS);rafId=requestAnimationFrame(loop);
}

function burnOne(){if(dead||won)return;if(nextBurn&&grid[nextBurn.y][nextBurn.x]===GEM)grid[nextBurn.y][nextBurn.x]=FIRE;updHUD();pickNextBurn();}
function updHUD(){let g=0;for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(grid[y][x]===GEM)g++;document.getElementById('c').textContent=collected;document.getElementById('n').textContent=NEED;document.getElementById('r').textContent=g;}

function tryMove(dx,dy){
  if(dead||won)return;const nx=px+dx,ny=py+dy;
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS||grid[ny][nx]===WALL)return;
  px=nx;py=ny;const tile=grid[ny][nx];
  if(tile===GEM){grid[ny][nx]=EMPTY;if(nextBurn&&nextBurn.x===nx&&nextBurn.y===ny)pickNextBurn();collected++;
    if(collected>=NEED&&!doorOpen){doorOpen=true;document.getElementById('msg').textContent='The door is open! Find it!';
      setTimeout(()=>{if(!dead&&!won)document.getElementById('msg').textContent='';},2500);}updHUD();}
  else if(tile===FIRE){dead=true;clearInterval(fInt);document.getElementById('msg').textContent='You burned! Game over.';document.getElementById('rb').style.display='block';}
  else if(doorOpen&&nx===DX&&ny===DY){won=true;clearInterval(fInt);document.getElementById('msg').textContent='You won! You escaped!';document.getElementById('rb').style.display='block';}
}

/* ── Drawing ── */
function drawFloor(x,y){
  const bx=x*T,by=y*T;
  ctx.fillStyle='#111827';
  ctx.fillRect(bx,by,T,T);
  ctx.strokeStyle='rgba(148,163,184,0.04)';
  ctx.lineWidth=0.5;
  ctx.strokeRect(bx+.25,by+.25,T-.5,T-.5);
}

function drawWall(x,y){
  const bx=x*T,by=y*T;
  const grd=ctx.createLinearGradient(bx,by,bx,by+T);
  grd.addColorStop(0,'#1e293b');
  grd.addColorStop(0.5,'#1a2332');
  grd.addColorStop(1,'#0f172a');
  ctx.fillStyle=grd;
  ctx.fillRect(bx,by,T,T);
  // top highlight
  ctx.fillStyle='rgba(148,163,184,0.08)';
  ctx.fillRect(bx,by,T,Math.max(2,T/10));
  // bottom shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(bx,by+T-Math.max(2,T/12),T,Math.max(2,T/12));
  // subtle inner border
  ctx.strokeStyle='rgba(148,163,184,0.05)';
  ctx.lineWidth=0.5;
  ctx.strokeRect(bx+0.5,by+0.5,T-1,T-1);
}

function drawGem(x,y,t){
  const isDoomed=nextBurn&&nextBurn.x===x&&nextBurn.y===y;
  const cx=x*T+T/2,cy=y*T+T/2,hs=T*0.22;
  ctx.save();
  ctx.translate(cx,cy);
  const angle=Math.PI/4 + Math.sin(t*0.002)*0.1;
  ctx.rotate(angle);

  if(isDoomed){
    const elapsed=t-burnStartTime;
    const pulse=0.5+0.5*Math.sin(elapsed*(0.007+0.004*(elapsed/FIRE_MS))*2*Math.PI/1000);
    // glow
    ctx.shadowColor=`rgba(255,${Math.round(100*(1-pulse))},0,0.6)`;
    ctx.shadowBlur=T*0.4;
    ctx.fillStyle=`rgb(255,${Math.round(120*(1-pulse))},${Math.round(30*(1-pulse))})`;
    ctx.fillRect(-hs,-hs,hs*2,hs*2);
    ctx.shadowBlur=0;
    ctx.fillStyle=`rgba(255,200,${Math.round(80*(1-pulse))},0.5)`;
    ctx.fillRect(-hs,-hs,hs*0.5,hs*0.5);
  }else{
    // glow
    ctx.shadowColor='rgba(96,165,250,0.4)';
    ctx.shadowBlur=T*0.35;
    const gemGrd=ctx.createLinearGradient(-hs,-hs,hs,hs);
    gemGrd.addColorStop(0,'#60a5fa');
    gemGrd.addColorStop(0.5,'#38bdf8');
    gemGrd.addColorStop(1,'#818cf8');
    ctx.fillStyle=gemGrd;
    ctx.fillRect(-hs,-hs,hs*2,hs*2);
    ctx.shadowBlur=0;
    // highlight
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillRect(-hs,-hs,hs*0.5,hs*0.5);
    // dark corner
    ctx.fillStyle='rgba(30,58,138,0.35)';
    ctx.fillRect(hs*0.44,hs*0.44,hs*0.56,hs*0.56);
  }
  ctx.restore();

  if(isDoomed){
    const pct=Math.min(1,(t-burnStartTime)/FIRE_MS);
    ctx.fillStyle=`rgba(255,80,0,${pct*0.7})`;
    ctx.beginPath();ctx.arc(cx,cy-T*0.32-pct*T*0.1,(2+pct*2)*T/40*1.5,0,Math.PI*2);ctx.fill();
  }
}

function drawFire(x,y,t){
  const bx=x*T,by=y*T,h=T,w=T;
  const s=(seed)=>0.5+0.5*Math.sin(t*.01+seed);
  const f1=s(x*2.1+y*1.7),f2=s(x*1.5+y*2.3+1.5),f3=s(x*1.9+y*1.2+3.0);
  // base glow
  ctx.save();
  ctx.shadowColor='rgba(239,68,68,0.3)';
  ctx.shadowBlur=T*0.5;
  ctx.fillStyle='#1c0a0a';
  ctx.fillRect(bx+w*.075,by+h*.825,w*.85,h*.175);
  ctx.shadowBlur=0;
  ctx.restore();
  // flames
  ctx.beginPath();ctx.moveTo(bx+w*.1,by+h*.95);ctx.quadraticCurveTo(bx+w*.05+f1*w*.075,by+h*.5+f1*h*.1,bx+w*.35,by+h*.3+f1*h*.15);ctx.quadraticCurveTo(bx+w*.5,by+h*.5,bx+w*.42,by+h*.95);ctx.closePath();ctx.fillStyle='#991b1b';ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+w*.58,by+h*.95);ctx.quadraticCurveTo(bx+w*.95+f3*w*.05,by+h*.5+f3*h*.1,bx+w*.7,by+h*.3+f3*h*.15);ctx.quadraticCurveTo(bx+w*.5,by+h*.5,bx+w*.9,by+h*.95);ctx.closePath();ctx.fillStyle='#991b1b';ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+w*.175,by+h*.95);ctx.quadraticCurveTo(bx+w*.125+f2*w*.05,by+h*.35+f2*h*.1,bx+w*.5,by+h*.12+f2*h*.2);ctx.quadraticCurveTo(bx+w*.875+f2*w*.05,by+h*.35+f2*h*.1,bx+w*.825,by+h*.95);ctx.closePath();ctx.fillStyle='#dc2626';ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+w*.275,by+h*.95);ctx.quadraticCurveTo(bx+w*.225+f2*w*.05,by+h*.45+f2*h*.1,bx+w*.5,by+h*.3+f2*h*.2);ctx.quadraticCurveTo(bx+w*.775+f2*w*.05,by+h*.45+f2*h*.1,bx+w*.725,by+h*.95);ctx.closePath();ctx.fillStyle='#ef4444';ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+w*.375,by+h*.95);ctx.quadraticCurveTo(bx+w*.5,by+h*.38+f2*h*.15,bx+w*.625,by+h*.95);ctx.closePath();ctx.fillStyle='#fbbf24';ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+w*.44,by+h*.55+f2*h*.1);ctx.quadraticCurveTo(bx+w*.5,by+h*.28+f2*h*.15,bx+w*.56,by+h*.55+f2*h*.1);ctx.closePath();ctx.fillStyle='#fef3c7';ctx.fill();
}

function drawDoor(t){
  const bx=DX*T,by=DY*T,p=0.7+0.3*Math.sin(t*.004);
  ctx.save();
  ctx.shadowColor='rgba(52,211,153,0.4)';
  ctx.shadowBlur=T*0.5;
  ctx.fillStyle='#064e3b';
  ctx.fillRect(bx,by,T,T);
  ctx.shadowBlur=0;
  ctx.restore();
  const doorGrd=ctx.createLinearGradient(bx,by,bx+T,by+T);
  doorGrd.addColorStop(0,`rgba(16,${0|140+40*p},80,1)`);
  doorGrd.addColorStop(1,`rgba(5,${0|100+30*p},60,1)`);
  ctx.fillStyle=doorGrd;
  ctx.fillRect(bx+T*.125,by+T*.125,T*.75,T*.875);
  ctx.fillStyle=`rgba(52,${0|200+55*p},140,1)`;
  ctx.fillRect(bx+T*.2,by+T*.2,T*.6,T*.7);
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(bx+T*.7,by+T*.5,T*.075,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(52,211,153,${0.3+0.15*p})`;
  ctx.lineWidth=2;ctx.strokeRect(bx+2,by+2,T-4,T-4);
}

function drawPlayer(){
  const cx=px*T+T/2,cy=py*T+T/2,r=T*0.32;
  ctx.save();
  ctx.shadowColor='rgba(167,139,250,0.5)';
  ctx.shadowBlur=T*0.4;
  const pGrd=ctx.createRadialGradient(cx-r*0.2,cy-r*0.2,0,cx,cy,r);
  pGrd.addColorStop(0,'#c4b5fd');
  pGrd.addColorStop(0.7,'#a78bfa');
  pGrd.addColorStop(1,'#7c3aed');
  ctx.fillStyle=pGrd;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='#6d28d9';ctx.lineWidth=Math.max(1.5,T/24);ctx.stroke();
  ctx.restore();
  // eyes
  const er=r*.18;
  ctx.fillStyle='#1e1b4b';
  ctx.beginPath();ctx.arc(cx-r*.3,cy-r*.22,er,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*.3,cy-r*.22,er,0,Math.PI*2);ctx.fill();
  // eye highlights
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();ctx.arc(cx-r*.3-er*0.2,cy-r*.22-er*0.2,er*0.35,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*.3-er*0.2,cy-r*.22-er*0.2,er*0.35,0,Math.PI*2);ctx.fill();
  // smile
  ctx.strokeStyle='#1e1b4b';ctx.lineWidth=Math.max(1,T/32);
  ctx.beginPath();ctx.arc(cx,cy+r*.15,r*.35,.2,Math.PI-.2);ctx.stroke();
}

function loop(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    drawFloor(x,y);
    const tile=grid[y][x];
    if(tile===WALL)drawWall(x,y);
    else if(tile===GEM)drawGem(x,y,t);
    else if(tile===FIRE)drawFire(x,y,t);
    if(doorOpen&&x===DX&&y===DY)drawDoor(t);
  }
  drawPlayer();
  if(dead||won){
    // blur overlay
    ctx.fillStyle='rgba(8,9,15,0.75)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // text with glow
    ctx.save();
    const fSize=Math.max(16,T*.5);
    ctx.font=`700 ${fSize}px 'Orbitron','Inter',system-ui,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(won){
      ctx.shadowColor='rgba(52,211,153,0.6)';ctx.shadowBlur=20;ctx.fillStyle='#34d399';
    }else{
      ctx.shadowColor='rgba(239,68,68,0.6)';ctx.shadowBlur=20;ctx.fillStyle='#ef4444';
    }
    ctx.fillText(won?'You escaped!':'You burned!',canvas.width/2,canvas.height/2);
    ctx.shadowBlur=0;
    ctx.font=`500 ${Math.max(11,T*.28)}px 'Inter',system-ui,sans-serif`;
    ctx.fillStyle='rgba(200,202,208,0.6)';
    ctx.fillText('Press Enter or tap New Game',canvas.width/2,canvas.height/2+fSize*1.2);
    ctx.restore();
    return;
  }
  rafId=requestAnimationFrame(loop);
}

/* ── Input ── */
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&(dead||won)){initGame();e.preventDefault();return;}const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};if(m[e.key]){tryMove(...m[e.key]);e.preventDefault();}});
function bindBtn(id,dx,dy){const btn=document.getElementById(id);let active=false;btn.addEventListener('touchstart',e=>{e.preventDefault();if(!active){active=true;tryMove(dx,dy);}},{passive:false});btn.addEventListener('touchend',()=>{active=false;},{passive:true});btn.addEventListener('click',()=>tryMove(dx,dy));}
bindBtn('btn-up',0,-1);bindBtn('btn-down',0,1);bindBtn('btn-left',-1,0);bindBtn('btn-right',1,0);
let ts=null;canvas.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();},{passive:false});canvas.addEventListener('touchend',e=>{if(!ts)return;const dx=e.changedTouches[0].clientX-ts.x,dy=e.changedTouches[0].clientY-ts.y;if(Math.max(Math.abs(dx),Math.abs(dy))>18)Math.abs(dx)>Math.abs(dy)?tryMove(dx>0?1:-1,0):tryMove(0,dy>0?1:-1);ts=null;e.preventDefault();},{passive:false});
let resizeTimer=null;window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if(dead||won)return;T=calcTile();canvas.width=COLS*T;canvas.height=ROWS*T;},100);});
initGame();
</script>
</body>
</html>
